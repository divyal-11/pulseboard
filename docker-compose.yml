services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://server:4000
      - NEXT_PUBLIC_API_URL=http://server:4000
    depends_on:
      - server
    restart: unless-stopped
